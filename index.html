<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumper Block</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #333; color: white; }
        canvas { border: 4px solid #000; background: #87CEEB; margin-top: 10px; width: 400px; height: 400px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button onclick="location.reload()" style="padding:10px; margin-top:10px;">RESETUJ IGRU</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let x = 50, y = 350;

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            // Nebo
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, 400, 400);
            // Sunce
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(350, 50, 30, 0, Math.PI*2); ctx.fill();
            // Tlo
            ctx.fillStyle = "green"; ctx.fillRect(0, 380, 400, 20);
            // Igrac
            ctx.fillStyle = "blue"; ctx.fillRect(x, y, 30, 30);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
