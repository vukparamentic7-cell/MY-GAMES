<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moja Igrica</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #333; font-family: sans-serif; }
        canvas { border: 2px solid white; background: #eee; margin-top: 20px; }
        .controls { margin-top: 10px; display: flex; gap: 10px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
        <button onclick="jump()">SKOK</button>
        <button onclick="goBack()">NAZAD</button>
        <button onclick="goFullScreen()">FULL SCREEN</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let player = { x: 50, y: 360, width: 30, height: 30, dy: 0, jumping: false };
        let obstacle = { x: 400, y: 360, width: 30, height: 30, speed: 5 };

        function jump() {
            if (!player.jumping) {
                player.dy = -12;
                player.jumping = true;
            }
        }

        function goBack() {
            window.history.back(); // Vraća na prethodnu stranicu
        }

        function goFullScreen() {
            if (canvas.requestFullscreen) { canvas.requestFullscreen(); }
        }

        function update() {
            player.dy += 0.6;
            player.y += player.dy;
            if (player.y >= 360) { player.y = 360; player.jumping = false; }
            obstacle.x -= obstacle.speed;
            if (obstacle.x + obstacle.width < 0) obstacle.x = 400;
            if (player.x < obstacle.x + obstacle.width && player.x + player.width > obstacle.x && player.y + player.height > obstacle.y) {
                obstacle.x = 400;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "blue";
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = "red";
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
</html>
