<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumper Block</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #333; color: white; font-family: sans-serif; }
        canvas { background: #87CEEB; border: 4px solid #000; margin-top: 10px; width: 300px; height: 300px; }
        .menu { margin-top: 10px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="menu">
        <button onclick="pColor='blue'">PLAVI</button>
        <button onclick="pColor='red'">CRVENI</button>
        <button onclick="pColor='yellow'">ZUTI</button>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="menu"><button onclick="start()" style="padding:15px 30px; background:green; color:white;">START</button></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let pColor = 'blue', pY = 350, pDy = 0, obsX = 400, running = false;

        function start() { running = true; }

        function loop() {
            // 1. Nebo
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, 400, 400);
            // 2. Sunce
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(350, 50, 30, 0, Math.PI*2); ctx.fill();
            // 3. Tlo
            ctx.fillStyle = "green"; ctx.fillRect(0, 370, 400, 30);
            
            // 4. Igrač
            ctx.fillStyle = pColor;
            ctx.fillRect(50, pY, 30, 30);
            
            if(running) {
                pDy += 0.8; pY += pDy;
                if(pY > 340) { pY = 340; pDy = 0; }
                obsX -= 5;
                if(obsX < -30) obsX = 400;
                ctx.fillStyle = "black"; ctx.fillRect(obsX, 340, 30, 30);
            }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
