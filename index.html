<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jumper Block</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #333; touch-action: none; color: white; font-family: sans-serif; }
        canvas { background: #87CEEB; border: 4px solid #000; margin-top: 10px; width: 90vw; max-width: 400px; height: 400px; }
        .menu { display: flex; gap: 10px; margin-top: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="menu">
        <button onclick="player.color='blue'">PLAVI</button>
        <button onclick="player.color='red'">CRVENI</button>
        <button onclick="player.color='yellow'">ZUTI</button>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="menu"><button onclick="handleAction()" style="background:#4CAF50; color:white; padding:15px 40px;">START / SKOK</button></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let player = { x: 50, y: 360, dy: 0, jumping: false, color: 'blue' };
        let obstacle = { x: 400, y: 360 };
        let gameActive = false, gameOver = false, score = 0;

        function handleAction() {
            // Ako je igra stala (ili je Game Over), resetuj sve
            if (!gameActive || gameOver) {
                player.y = 360; player.dy = 0; player.jumping = false;
                obstacle.x = 400;
                score = 0;
                gameActive = true;
                gameOver = false;
            } else if (!player.jumping) {
                // Skok
                player.dy = -12;
                player.jumping = true;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            
            // Nebo i Sunce
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(350, 50, 30, 0, Math.PI*2); ctx.fill();
            // Tlo
            ctx.fillStyle = "#228B22"; ctx.fillRect(0, 385, 400, 15);
            
            // Iscrtavanje igrača
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, 25, 25);
            
            // Iscrtavanje prepreke
            ctx.fillStyle = "black";
            ctx.fillRect(obstacle.x, 360, 25, 25);

            if (gameActive) {
                // Fizika skakanja
                player.dy += 0.6; 
                player.y += player.dy;
                if (player.y >= 360) { player.y = 360; player.jumping = false; player.dy = 0; }
                
                // Pomeranje prepreke
                obstacle.x -= 6;
                if(obstacle.x < -25) { obstacle.x = 400; score++; }
                
                // Provera kolizije (Game Over uslov)
                if(player.x < obstacle.x + 25 && player.x + 25 > obstacle.x && player.y + 25 > 360) {
                    gameOver = true;
                    gameActive = false; // OVO ZAUSTAVLJA IGRU
                }
            }

            if(gameOver) { 
                ctx.fillStyle="black"; ctx.font="30px Arial"; ctx.fillText("GAME OVER: " + score, 100, 200); 
                ctx.font="20px Arial"; ctx.fillText("Klikni START za ponovo", 100, 240);
            }
            
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
