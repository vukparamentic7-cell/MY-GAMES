<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumper Block</title>
    <style>
        /* Postavlja igru preko celog ekrana bez skrolovanja */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 2 / 1; 
        }
    </style>
</head>
<body>

    <!-- Platno na kome se igra crta -->
    <canvas id="gameCanvas"></canvas>

    <!-- Povezivanje sa tvojim kodom -->
    <script src="script.js"></script>

</body>
</html>
