<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumper Block - Pro Verzija</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #222; color: white; font-family: sans-serif; }
        #gameCanvas { background: linear-gradient(#87CEEB, #E0F7FA); border: 4px solid #000; margin-top: 10px; }
        .controls { margin-top: 10px; display: flex; gap: 5px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="player.color='blue'">PLAVI</button>
        <button onclick="player.color='red'">CRVENI</button>
        <button onclick="player.color='yellow'">ZUTI</button>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls"><button onclick="handleAction()" style="padding: 15px 40px; background: green; color: white;">START / SKOK</button></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let player = { x: 50, y: 350, dy: 0, jumping: false, color: 'blue' };
        let gameActive = false, obstacles = [{x: 400, type: 'block'}, {x: 700, type: 'spike'}];
        let mountains = [{x: 0, w: 100}, {x: 200, w: 150}, {x: 350, w: 80}];

        function handleAction() { gameActive = true; if(!player.jumping) { player.dy = -12; player.jumping = true; } }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            
            // Planine
            ctx.fillStyle = "#558B2F";
            mountains.forEach(m => {
                ctx.fillRect(m.x, 380 - m.w/2, m.w, m.w/2);
                if(gameActive) m.x -= 0.5;
                if(m.x < -150) m.x = 450;
            });

            // Tlo
            ctx.fillStyle = "#2E7D32"; ctx.fillRect(0, 380, 400, 20);

            // Igrač
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, 30, 30);
            if(player.jumping) player.dy += 0.8;
            player.y += player.dy;
            if(player.y >= 350) { player.y = 350; player.jumping = false; player.dy = 0; }

            // Prepreke
            ctx.fillStyle = "black";
            obstacles.forEach(o => {
                if(gameActive) o.x -= 5;
                ctx.fillRect(o.x, 350, 30, 30);
                if(o.x < -30) o.x = 450;
            });

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
