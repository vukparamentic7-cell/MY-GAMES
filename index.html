<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumper Block</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            background-color: #ffffff; /* Tvoja bela pozadina */
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.15);
            border-radius: 4px;
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const GRAVITY = 0.6;
const JUMP_FORCE = -12;
// VEĆI RAZMAK IZMEĐU PREPREKA (Povećaj broj ako želiš još lakše)
const MIN_OBSTACLE_GAP = 160; 

let score = 0;
let highScore = localStorage.getItem("jumper_highscore") || 0;
let gameOver = false;
let gameFrame = 0;

// CRVENA KOCKICA (IGRAČ)
const player = {
    x: 100,
    y: 250,
    size: 50,
    vy: 0,
    isGrounded: false,
    eyesOpen: true,
    blinkTimer: 0
};

let obstacles = [];
const obstacleTypes = [
    { type: 'spike', width: 20, height: 30, color: '#000000' },
    { type: 'box', width: 40, height: 40, color: '#000000' }
];
let nextObstacleSpawnFrame = 0;

// KONTROLE
window.addEventListener("keydown", (e) => {
    if ((e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW")) {
        if (player.isGrounded && !gameOver) {
            player.vy = JUMP_FORCE;
            player.isGrounded = false;
        }
        if (gameOver) {
            resetGame();
        }
    }
});

canvas.addEventListener("touchstart", () => {
    if (player.isGrounded && !gameOver) {
        player.vy = JUMP_FORCE;
        player.isGrounded = false;
    }
    if (gameOver) {
        resetGame();
    }
});

function resetGame() {
    score = 0;
    obstacles = [];
    player.y = 250;
    player.vy = 0;
    player.isGrounded = true;
    gameOver = false;
    gameFrame = 0;
    nextObstacleSpawnFrame = 50;
}

// TAJMING ZA TREPTANJE (na svakih ~3 sekunde)
function updateBlinking() {
    player.blinkTimer++;
    if (player.blinkTimer % 180 < 12) {
        player.eyesOpen = false;
    } else {
        player.eyesOpen = true;
    }
}

// CRTANJE CRNE PODLOGE (TLA)
function drawGround() {
    ctx.fillStyle = "#333333"; // Tvoje tamno sivo/crno tlo
    ctx.fillRect(0, 300, canvas.width, 100);
}

// CRTANJE ORIGINALNE CRVENE KOCKICE SA LJUTIM OČIMA KOJE TREPĆU
function drawPlayer() {
    updateBlinking();
    const x = player.x;
    const y = player.y;
    const size = player.size;

    // Crveno telo kockice
    ctx.fillStyle = "#FF0000";
    ctx.fillRect(x, y, size, size);

    if (player.eyesOpen) {
        // LEVO OKO (Belo)
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(x + 8, y + 15, 12, 12);
        // DESNO OKO (Belo)
        ctx.fillRect(x + size - 20, y + 15, 12, 12);

        // LEVA ZENICA (Crvena/Crna)
        ctx.fillStyle = "#000000";
        ctx.fillRect(x + 12, y + 19, 5, 5);
        // DESNA ZENICA
        ctx.fillRect(x + size - 17, y + 19, 5, 5);

        // LJUTE OBRVE (Kose crne linije preko očiju)
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        // Leva obrva (nagnuta nadole ka sredini)
        ctx.beginPath();
        ctx.moveTo(x + 5, y + 10);
        ctx.lineTo(x + 22, y + 18);
        ctx.stroke();

        // Desna obrva (nagnuta nadole ka sredini)
        ctx.beginPath();
        ctx.moveTo(x + size - 5, y + 10);
        ctx.lineTo(x + size - 22, y + 18);
        ctx.stroke();
    } else {
        // Kada trepne: Ljut pogled ostaje namršten, ali su oči sklopljene u tanke crte
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 3.5;
        ctx.lineCap = "round";

        // Levo sklopljeno oko pod uglom
        ctx.beginPath();
        ctx.moveTo(x + 8, y + 19);
        ctx.lineTo(x + 18, y + 21);
        ctx.stroke();

        // Desno sklopljeno oko pod uglom
        ctx.beginPath();
        ctx.moveTo(x + size - 8, y + 19);
        ctx.lineTo(x + size - 18, y + 21);
        ctx.stroke();
    }
}

// LEPO VIDLJIV SCORE I HIGH SCORE
function drawScores() {
    ctx.save();
    ctx.font = "bold 26px sans-serif";
    ctx.fillStyle = "#333333"; // Tamno siva slova koja se vide na beloj pozadini
    
    // Blaga bela senka iza teksta za bolji kontrast
    ctx.shadowColor = "rgba(255, 255, 255, 0.8)";
    ctx.shadowBlur = 4;

    ctx.fillText("SCORE: " + score, 40, 45);

    ctx.textAlign = "right";
    ctx.fillText("BEST: " + highScore, canvas.width - 50, 45);
    ctx.restore();
}

function update() {
    gameFrame++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawGround();

    if (!gameOver) {
        player.vy += GRAVITY;
        player.y += player.vy;

        if (player.y >= 300 - player.size) {
            player.y = 300 - player.size;
            player.vy = 0;
            player.isGrounded = true;
        }

        // GENERISANJE PREPREKA SA VEĆIM RAZMAKOM
        if (gameFrame >= nextObstacleSpawnFrame) {
            let randomType = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
            obstacles.push({
                x: canvas.width,
                y: 300 - randomType.height,
                width: randomType.width,
                height: randomType.height,
                type: randomType.type,
                color: randomType.color
            });
            nextObstacleSpawnFrame = gameFrame + MIN_OBSTACLE_GAP + Math.floor(Math.random() * 60);
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= (6 + Math.floor(score / 10)); // Brzina se lagano povećava

            if (o.x + o.width < 0) {
                obstacles.splice(i, 1);
                score++;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("jumper_highscore", highScore);
                }
                continue;
            }

            if (
                player.x < o.x + o.width &&
                player.x + player.size > o.x &&
                player.y < o.y + o.height &&
                player.y + player.size > o.y
            ) {
                gameOver = true;
            }
        }
    }

    // CRTANJE PREPREKA (Šiljci i kutije)
    obstacles.forEach(o => {
        ctx.fillStyle = o.color;
        if (o.type === 'spike') {
            ctx.beginPath();
            ctx.moveTo(o.x, o.y + o.height);
            ctx.lineTo(o.x + o.width / 2, o.y);
            ctx.lineTo(o.x + o.width, o.y + o.height);
            ctx.fill();
        } else {
            ctx.fillRect(o.x, o.y, o.width, o.height);
        }
    });

    drawPlayer();
    drawScores();

    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = "bold 36px Arial";
        ctx.fillStyle = "#FFFFFF";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);

        ctx.font = "20px Arial";
        ctx.fillText("Pritisni SPACE za ponovnu igru", canvas.width / 2, canvas.height / 2 + 20);
    }

    requestAnimationFrame(update);
}

resetGame();
update();
</script>

</body>
</html>
