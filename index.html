obstacles.forEach(o => { 
                ctx.fillStyle = o.color; 
                if(o.type === 'spike') {
                    ctx.beginPath(); 
                    ctx.moveTo(o.x, 400); 
                    ctx.lineTo(o.x+15, 370); 
                    ctx.lineTo(o.x+30, 400); 
                    ctx.fill();
                } else {
                    ctx.fillRect(o.x, 370, 30, 30); 
                }
            });
