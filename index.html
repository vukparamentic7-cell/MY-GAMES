<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Jumper Block - Deluxe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #222; display: flex; justify-content: center; align-items: center; }
        canvas { 
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            max-width: 100%; max-height: 100%;
            aspect-ratio: 2 / 1; border: 4px solid #000; border-radius: 10px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 400;
        const cw = canvas.width; const ch = canvas.height;

        let gameState = 'menu', score = 0, highScore = localStorage.getItem('jumperHighScore') || 0;
        let clouds = [{x: 100, y: 50, sp: 0.5}, {x: 400, y: 80, sp: 0.3}, {x: 650, y: 40, sp: 0.7}];
        let grassOffset = 0;

        let player = {
            x: 100, y: ch - 60, width: 40, height: 40, color: 'red', dy: 0, gravity: 1.2, jumpForce: -20, onGround: false,
            update: function() {
                this.dy += this.gravity; this.y += this.dy;
                if (this.y + this.height > ch - 20) { this.y = ch - 60; this.dy = 0; this.onGround = true; }
            },
            draw: function() {
                let h = this.onGround ? 40 : 40 + Math.abs(this.dy);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y + (40-h), this.width, h);
            }
        };

        let obstacles = [];
        window.addEventListener('keydown', (e) => { 
            if (e.code === 'Space') {
                if (gameState === 'playing' && player.onGround) { player.dy = player.jumpForce; player.onGround = false; }
                else if (gameState !== 'playing') { gameState = 'playing'; score = 0; obstacles = []; }
            }
        });

        function loop() {
            ctx.clearRect(0, 0, cw, ch);
            // Sunce
            ctx.fillStyle = "#FFD700"; ctx.beginPath(); ctx.arc(cw - 70, 70, 40, 0, Math.PI*2); ctx.fill();
            // Oblaci
            ctx.fillStyle = "white";
            clouds.forEach(c => {
                ctx.beginPath(); ctx.arc(c.x, c.y, 15, 0, Math.PI*2); ctx.arc(c.x+20, c.y-10, 20, 0, Math.PI*2); ctx.fill();
                c.x -= c.sp; if(c.x < -60) c.x = cw + 60;
            });
            // Trava
            ctx.fillStyle = "#228B22"; ctx.fillRect(0, ch - 20, cw, 20);
            
            if (gameState === 'playing') {
                player.update(); player.draw();
                if (Math.random() < 0.02) obstacles.push({x: cw, y: ch - 50});
                obstacles.forEach((o, i) => {
                    o.x -= 8; ctx.fillStyle = 'black'; ctx.fillRect(o.x, o.y, 30, 30);
                    if (o.x < -30) { obstacles.splice(i, 1); score++; }
                    if (player.x < o.x + 30 && player.x + 40 > o.x && player.y + 40 > o.y) gameState = 'dead';
                });
                ctx.fillStyle = 'black'; ctx.fillText("Score: " + score, 20, 40);
            } else {
                ctx.textAlign = 'center'; ctx.font = '30px Arial'; ctx.fillText("PRESS SPACE", cw/2, ch/2);
            }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
