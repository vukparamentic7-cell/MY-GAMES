<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jumper Block</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #333; font-family: sans-serif; touch-action: manipulation; }
        canvas { border: 4px solid #000; background: #87CEEB; margin-top: 20px; width: 90vw; max-width: 400px; height: auto; }
        .controls { margin-top: 20px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none; background: #4CAF50; color: white; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls"><button id="actionBtn" onclick="handleAction()">START</button></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const btn = document.getElementById("actionBtn");

        let player = { x: 50, y: 360, width: 30, height: 30, dy: 0, jumping: false };
        let obstacles = [{ x: 400, y: 360, width: 30, height: 30, type: 'block' }, { x: 600, y: 380, width: 20, height: 20, type: 'spike' }, { x: 800, y: 300, width: 30, height: 100, type: 'tunnel' }];
        let gameSpeed = 5, score = 0, gameActive = false, gameOver = false;

        function handleAction() {
            if (!gameActive) { gameActive = true; gameOver = false; score = 0; btn.innerText = "SKOK"; }
            else { if (!player.jumping) { player.dy = -12; player.jumping = true; } }
        }

        function update() {
            if (!gameActive || gameOver) return;
            player.dy += 0.6; player.y += player.dy;
            if (player.y >= 360) { player.y = 360; player.jumping = false; player.dy = 0; }
            obstacles.forEach(obs => {
                obs.x -= gameSpeed;
                if (obs.x + obs.width < 0) { obs.x = 800 + Math.random() * 200; score++; gameSpeed = Math.min(10, 5 + Math.floor(score / 5)); }
                if (player.x < obs.x + obs.width && player.x + player.width > obs.x && player.y + player.height > obs.y && player.y < obs.y + obs.height) { gameOver = true; gameActive = false; btn.innerText = "RESTART"; }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Sunce i oblaci
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(350, 50, 30, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "white"; [{x:50, y:50}, {x:200, y:80}, {x:300, y:40}].forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 20, 0, Math.PI*2); ctx.fill(); });
            
            // ZID (Smanjen)
            ctx.fillStyle = "#555"; ctx.fillRect(0, 390, 400, 5); 

            if (!gameActive && !gameOver) { // Start screen
                ctx.fillStyle = "black"; ctx.font = "40px Arial"; ctx.fillText("Jumper Block", 80, 200);
            } else if (gameOver) { // Game Over screen
                ctx.fillStyle = "red"; ctx.font = "40px Arial"; ctx.fillText("GAME OVER", 90, 200);
                ctx.fillStyle = "black"; ctx.font = "20px Arial"; ctx.fillText("Score: " + score, 160, 240);
            } else {
                ctx.fillStyle = "blue"; ctx.fillRect(player.x, player.y, player.width, player.height);
                obstacles.forEach(obs => {
                    if (obs.type === 'block') ctx.fillStyle = "red"; else if (obs.type === 'spike') ctx.fillStyle = "black"; else ctx.fillStyle = "darkred";
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                });
                ctx.fillStyle = "black"; ctx.font = "20px Arial"; ctx.fillText("Score: " + score, 10, 30);
            }
        }
        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
</html>
