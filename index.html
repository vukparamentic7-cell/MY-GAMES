<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumper Block - Deluxe</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #333; color: white; font-family: sans-serif; }
        canvas { background: #87CEEB; border: 4px solid #000; margin-top: 10px; width: 400px; height: 400px; }
        button { padding: 15px 30px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button onclick="location.reload()">RESETUJ IGRU</button>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let y = 350, dy = 0, jumping = false;

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            // Nebo
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, 400, 400);
            // Sunce
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(350, 50, 30, 0, Math.PI*2); ctx.fill();
            // Tlo
            ctx.fillStyle = "green"; ctx.fillRect(0, 380, 400, 20);
            
            // Igrač sa air dynamics (istezanje pri skoku)
            let height = jumping ? 40 : 30;
            ctx.fillStyle = "blue";
            ctx.fillRect(50, y - (height - 30), 30, height);
            
            // Oči sa treptanjem
            let blink = Math.floor(Date.now() / 500) % 5 === 0;
            ctx.fillStyle = blink ? "blue" : "white";
            ctx.fillRect(55, y + 5, 8, 8);
            ctx.fillRect(68, y + 5, 8, 8);
            if (!blink) {
                ctx.fillStyle = "black";
                ctx.fillRect(58, y + 8, 3, 3);
                ctx.fillRect(71, y + 8, 3, 3);
            }

            requestAnimationFrame(draw);
        }
        
        window.onclick = () => { if(!jumping) { dy = -15; jumping = true; } };
        
        function update() {
            if(jumping) {
                dy += 0.8; y += dy;
                if(y >= 350) { y = 350; jumping = false; dy = 0; }
            }
            requestAnimationFrame(update);
        }
        
        draw();
        update();
    </script>
</body>
</html>
