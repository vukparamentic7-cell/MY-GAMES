<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vukova Igrica</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #333; font-family: sans-serif; touch-action: manipulation; }
        canvas { border: 4px solid #000; background: #87CEEB; margin-top: 20px; width: 90vw; max-width: 400px; height: auto; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #4CAF50; color: white; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
        <button onclick="jump()">SKOK</button>
        <button onclick="window.history.back()">NAZAD</button>
        <button onclick="document.documentElement.requestFullscreen()">FULL SCREEN</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let player = { x: 50, y: 360, width: 30, height: 30, dy: 0, jumping: false };
        let obstacle = { x: 400, y: 360, width: 30, height: 30, speed: 5 };

        function jump() {
            if (!player.jumping) {
                player.dy = -12;
                player.jumping = true;
            }
        }

        function update() {
            player.dy += 0.6;
            player.y += player.dy;
            if (player.y >= 360) { player.y = 360; player.jumping = false; }
            
            obstacle.x -= obstacle.speed;
            if (obstacle.x + obstacle.width < 0) obstacle.x = 400;

            if (player.x < obstacle.x + obstacle.width && player.x + player.width > obstacle.x && player.y + player.height > obstacle.y) {
                obstacle.x = 400;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Zemlja
            ctx.fillStyle = "#555";
            ctx.fillRect(0, 390, 400, 10);
            // Igrac
            ctx.fillStyle = "blue";
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Prepreka
            ctx.fillStyle = "red";
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
</html>
